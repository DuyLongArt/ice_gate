# PowerSync Sync Rules - Edition 2 (Fixed Case-Sensitivity & ID Mapping)
# Generated for Ice Shield based on Supabase + PowerSync best practices

config:
  edition: 2

bucket_definitions:
  # Global data accessible to everyone
  global:
    data:
      - SELECT * FROM internal_widgets
      - SELECT * FROM external_widgets
      - SELECT * FROM themes
      - SELECT * FROM themes_config
      - SELECT * FROM quotes
      - SELECT * FROM quests
      - SELECT * FROM custom_notifications
      - SELECT * FROM meals
      - SELECT * FROM days

  # User-specific data using Supabase Auth ID
  by_user:
    # Map Supabase Auth UUID to the legacy integer ID used in the app
    parameters: SELECT "personID" as internal_id FROM persons WHERE id = request.user_id()
    data:
      - SELECT * FROM persons WHERE id = request.user_id()
      - SELECT * FROM profiles WHERE id = request.user_id()
      - SELECT * FROM project_notes WHERE "personID" = bucket.internal_id
      - SELECT * FROM projects WHERE "personID" = bucket.internal_id
      - SELECT * FROM email_addresses WHERE "personID" = bucket.internal_id
      - SELECT * FROM user_accounts WHERE "personID" = bucket.internal_id
      - SELECT * FROM detail_information WHERE "personID" = bucket.internal_id
      - SELECT * FROM skills WHERE "personID" = bucket.internal_id
      - SELECT * FROM financial_accounts WHERE "personID" = bucket.internal_id
      - SELECT * FROM assets WHERE "personID" = bucket.internal_id
      - SELECT * FROM transactions WHERE "personID" = bucket.internal_id
      - SELECT * FROM goals WHERE "personID" = bucket.internal_id
      - SELECT * FROM scores WHERE "personID" = bucket.internal_id
      - SELECT * FROM habits WHERE "personID" = bucket.internal_id
      - SELECT * FROM person_widgets WHERE "personID" = bucket.internal_id
      - SELECT * FROM health_metrics WHERE "personID" = bucket.internal_id
      - SELECT * FROM water_logs WHERE "personID" = bucket.internal_id
      - SELECT * FROM sleep_logs WHERE "personID" = bucket.internal_id
      - SELECT * FROM exercise_logs WHERE "personID" = bucket.internal_id
      - SELECT * FROM focus_sessions WHERE "personID" = bucket.internal_id
      - SELECT * FROM blog_posts WHERE "authorID" = bucket.internal_id
      - SELECT * FROM sessions WHERE id = request.user_id()
